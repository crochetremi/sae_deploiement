services:
  mariadb:
    image: mariadb:10.6
    container_name: bookstack_db
    environment:
      - MYSQL_ROOT_PASSWORD=secret_root_password
      - MYSQL_DATABASE=bookstackapp
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=secret_password
    volumes:
      - bookstack_db_data_vanilla:/var/lib/mysql
    restart: unless-stopped

  openldap:
    image: osixia/openldap:1.5.0
    container_name: bookstack_ldap
    ports:
      - '389:389'
    environment:
      - LDAP_ORGANISATION=IUT Org
      - LDAP_DOMAIN=iut.org
      - LDAP_ADMIN_PASSWORD=adminpassword
    volumes:
      - openldap_conf_data_vanilla:/etc/ldap/slapd.d
      - openldap_db_data_vanilla:/var/lib/ldap
    restart: unless-stopped
  
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: bookstack_ldap_admin
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false
    ports:
      - '8081:80'
    restart: unless-stopped
    depends_on:
      - openldap
  
  bookstack:
    image: lscr.io/linuxserver/bookstack
    container_name: bookstack_app
    environment:
      - APP_URL=http://localhost:8080
      - APP_KEY=base64:YGbrwK+CsAKb1yyyD6LTVQy/QbvY7OTjBTaeZgObfvU=
      - DB_HOST=mariadb
      - DB_USER=bookstack
      - DB_PASS=secret_password
      - DB_DATABASE=bookstackapp
      - DB_USERNAME=bookstack
      - DB_PASSWORD=secret_password
      # --- Configuration LDAP Locale ---
      - AUTH_METHOD=ldap
      - LDAP_SERVER=ldap://openldap:389
      - LDAP_BASE_DN=dc=iut,dc=org
      - LDAP_DN=cn=admin,dc=iut,dc=org
      - LDAP_PASS=adminpassword
      - LDAP_USER_FILTER=(uid=$${user})
      - LDAP_ID_ATTRIBUTE=uid
      - LDAP_EMAIL_ATTRIBUTE=mail
      - LDAP_DISPLAY_NAME_ATTRIBUTE=cn
      - LDAP_VERSION=3
    volumes:
      - bookstack_app_data_vanilla:/config
    ports:
      - 8080:80
    restart: unless-stopped
    depends_on:
      - mariadb
      - openldap

volumes:
  bookstack_db_data_vanilla:
  bookstack_app_data_vanilla:
  openldap_conf_data_vanilla:
  openldap_db_data_vanilla: