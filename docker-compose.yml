services:
  mariadb:
    image: mariadb:10.6
    container_name: bookstack_db
    environment:
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_pwd
      - MYSQL_DATABASE=bookstackapp
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD_FILE=/run/secrets/db_bookstack_pwd
    secrets:
      - db_root_pwd
      - db_bookstack_pwd
    volumes:
      - bookstack_db_data_vanilla:/var/lib/mysql
      - ./sql/init_nextcloud.sql:/docker-entrypoint-initdb.d/init_nextcloud.sql
    restart: unless-stopped

  openldap:
    image: osixia/openldap:1.5.0
    container_name: bookstack_ldap
    ports:
      - '389:389'
    environment:
      - LDAP_ADMIN_PASSWORD_FILE=/run/secrets/ldap_admin_pwd
      - LDAP_BASE_DN=dc=mongroupe,dc=local
      - LDAP_DN=cn=admin,dc=mongroupe,dc=local
      - LDAP_ORGANISATION=MonGroupe
      - LDAP_DOMAIN=mongroupe.local
    secrets:
      - ldap_admin_pwd
    volumes:
      - openldap_conf_data_vanilla:/etc/ldap/slapd.d
      - openldap_db_data_vanilla:/var/lib/ldap
    restart: unless-stopped
  
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: bookstack_ldap_admin
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false
    restart: unless-stopped
    ports:
      - 8081:80
    depends_on:
      - openldap
  
  bookstack:
    image: lscr.io/linuxserver/bookstack
    container_name: bookstack_app
    environment:
      - APP_URL=https://bookstack.mongroupe.local      
      - FILE__APP_KEY=/run/secrets/app_key
      - DB_HOST=mariadb
      - DB_USER=bookstack
      - FILE__DB_PASS=/run/secrets/db_bookstack_pwd
      - DB_DATABASE=bookstackapp
      - DB_USERNAME=bookstack
      - FILE__DB_PASSWORD=/run/secrets/db_bookstack_pwd
      # --- Configuration LDAP Locale ---
      - AUTH_METHOD=ldap
      - LDAP_SERVER=ldap://openldap:389
      - LDAP_BASE_DN=dc=mongroupe,dc=local
      - LDAP_DN=cn=admin,dc=mongroupe,dc=local
      - FILE__LDAP_PASS=/run/secrets/ldap_admin_pwd
      - LDAP_USER_FILTER=(uid=$${user})
      - LDAP_ID_ATTRIBUTE=uid
      - LDAP_EMAIL_ATTRIBUTE=mail
      - LDAP_DISPLAY_NAME_ATTRIBUTE=cn
      - LDAP_VERSION=3
    secrets:
      - app_key
      - db_bookstack_pwd
      - ldap_admin_pwd
    volumes:
      - bookstack_app_data_vanilla:/config
    ports:
      - 8080:80
    restart: unless-stopped
    depends_on:
      - mariadb
      - openldap

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - MYSQL_HOST=mariadb
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD_FILE=/run/secrets/db_nextcloud_pwd
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD_FILE=/run/secrets/nextcloud_admin_pwd
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.mongroupe.local
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=nextcloud.mongroupe.local
    secrets:
      - db_nextcloud_pwd
      - nextcloud_admin_pwd 
    volumes:
      - nextcloud_data:/var/www/html
    depends_on:
      - mariadb


  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - bookstack
      - nextcloud
      - phpldapadmin
    restart: unless-stopped    
    networks:
      default:
        aliases:
          - bookstack.mongroupe.local
          - nextcloud.mongroupe.local
          - phpldapadmin.mongroupe.local

  uptime-kuma:
    image: louislam/uptime-kuma:1
    volumes:
    - uptime_kuma_data:/app/data
    ports:
    - "3001:3001"

secrets:
  db_root_pwd:
    file: ./secrets/db_root_pwd.txt
  db_bookstack_pwd:
    file: ./secrets/db_bookstack_pwd.txt
  db_nextcloud_pwd:
    file: ./secrets/db_nextcloud_pwd.txt
  nextcloud_admin_pwd:
    file: ./secrets/nextcloud_admin_pwd.txt
  ldap_admin_pwd:
    file: ./secrets/ldap_admin_pwd.txt
  app_key:
    file: ./secrets/app_key.txt

volumes:
  bookstack_db_data_vanilla:
  bookstack_app_data_vanilla:
  openldap_conf_data_vanilla:
  openldap_db_data_vanilla:
  nextcloud_data:
  uptime_kuma_data: